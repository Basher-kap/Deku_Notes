name: Create Production Builds

# on:
#   push:
#     branches: ['main']
#     paths:
#       - '**'
#       - '!**/*.md'

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

jobs:
  build_android:
    type: build
    params:
      platform: android
      profile: production
  build_ios:
    type: build
    params:
      platform: ios
      profile: production